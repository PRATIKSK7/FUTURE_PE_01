name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./apps/web
        
      - name: Install Backend Dependencies
        run: pip install -r requirements.txt
        working-directory: ./apps/api
        
      - name: Type Check & Lint (Frontend)
        run: |
          npm run typecheck
          npm run lint
        working-directory: ./apps/web
        
      - name: Pytest Backend Suite
        run: pytest apps/api/tests/ --cov=apps/api
        env:
          CLERK_ISSUER_URL: https://clerk.placeholder.com
        
      - name: Vitest Frontend Suite
        run: npm run test:coverage
        working-directory: ./apps/web
        
      - name: Playwright E2E Tests
        run: |
          npx playwright install --with-deps
          npx playwright test

  security-and-build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: NPM Dependency Audit
        run: npm audit --audit-level=high
        working-directory: ./apps/web
        continue-on-error: true
        
      - name: Python Dependency Audit (Safety)
        run: |
          pip install safety
          safety check -r apps/api/requirements.txt || true

      - name: Verify API Docker Build
        run: docker build -t copycraft-api:test -f apps/api/Dockerfile .

      - name: Verify Web Docker Build
        run: docker build -t copycraft-web:test -f apps/web/Dockerfile .

      - name: Trivy Security Scan (API)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'copycraft-api:test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
